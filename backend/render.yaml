# Render Blueprint for Sinatra Backend
# This file enables one-click deployment on Render

services:
  - type: web
    name: sinatra-backend
    runtime: python
    buildCommand: apt-get update && apt-get install -y fluidsynth libfluidsynth-dev libsndfile1 wget && mkdir -p /usr/share/sounds/sf2 && (wget -q https://github.com/FluidSynth/fluidsynth/raw/master/soundfont/FluidR3_GM.sf2 -O /usr/share/sounds/sf2/FluidR3_GM.sf2 || echo "SoundFont download failed, will use system default") && pip install --upgrade pip && pip install -r requirements.txt && pip install basic-pitch==0.4.0 --no-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter  # Free tier: starter, Paid: standard
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: 3.12.0
    healthCheckPath: /health
    autoDeploy: true
