# Render Blueprint for Sinatra Backend
# This file enables one-click deployment on Render
# Note: Render may not allow apt-get in buildCommand. If this fails, use Dockerfile instead.

services:
  - type: web
    name: sinatra-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter  # Free tier: starter, Paid: standard
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: 3.12.0
    healthCheckPath: /health
    autoDeploy: true
